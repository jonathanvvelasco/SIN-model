
general:
  # Model and scenario names
  model: "SIN Brasil expandido"
  scen: "base"

  # Include sets
  history: [2020]
  horizon: [2030, 2040, 2050]
  country: "Brazil"
  nodes: 
    - "South"
    - "North"
    - "Northeast"
    - "Southeast"
  commodities:
    - "electricity"
    - "water_1"
    - "water_2"
    - "water_3"
    - "water_4"
    - "water_5"
    - "water_6"
    - "water_7"
    - "water_8"
    - "water_9"
    - "water_10"
    - "water_11"
    - "water_12"
  energy_lvl: ["primary", "secondary", "final"]
  modes:
    - "n-to-ne"
    - "ne-to-n"
    - "n-to-se"
    - "se-to-n"
    - "ne-to-se"
    - "se-to-ne"
    - "se-to-s"
    - "s-to-se"
    - "M1"
    - "M2"
  int_rate: 0.08                                  # interest rate
  demand_per_year:                                # electricity demand GWa BEN year 2019
    South: 11.67
    North: 5.57
    Northeast: 11.05
    Southeast: 39.55
  dem_growth: [1.31, 1.69, 2.11]                  # centralized demand
      # years: 2030, 2040, 2050

technology: 
  plants:             # Overall echnologies
    - "bio_ppl"
    - "gas_ppl"
    - "gas_ppl_1"
    - "gas_ppl_2"
    - "gas_ppl_ccs"
    - "gas_ppl_ccs_1"
    - "gas_ppl_ccs_2"
    - "coal_ppl"
    - "nuc_ppl"
    - "oil_ppl"
    - "solar_pv_ppl"
  battery_n:          # Battery technologies
    - "batt_n"
  battery_ne:
    - "batt_ne"
  battery_se:
    - "batt_se"
  battery_s:
    - "batt_s"
  northeast_wind:     # Wind technologies
    - "wind_ppl_cos"  #wind_ppl_cos means wind_ppl on the coast of northeast of Brazil. To obtain it's parameters, it was considered data from RN and CE states.
    - "wind_ppl_int"  #wind_ppl_int means wind_ppl on inlands of northeast of Brazil. To obtain it's parameters, it was considered data from BA and PI states.
  south_wind:
    - "wind_ppl_rs"   #wind_ppl_rs means wind_ppl on Rio Grande do Sul state. To obtain it's parameters, it was considered data from RS state.
  brazil_wind:        
    - "wind_ppl"      #wind_ppl means wind on the rest of the country
  north_hydro:        # Hidro technologies
    - "hydro_4"       # REE Norte, Belo Monte e Amazonas
    - "hydro_8"
    - "hydro_9"
  northeast_hydro:
    - "hydro_3"       # REE Nordeste
  southeast_hydro:    
    - "hydro_1"       # REE Sudeste, Itaipu, Madeira, Teles Pires, Paraná e Paranapanema
    - "hydro_5"
    - "hydro_6"
    - "hydro_7"
    - "hydro_10"
    - "hydro_12"
  south_hydro:
    - "hydro_2"       # REE Sul e Iguaçu
    - "hydro_11"
  north_pump:         # SPHS technologies
    - "sphs_4"
    - "sphs_8"
    - "sphs_9"
  northeast_pump:
